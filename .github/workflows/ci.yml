name: auto-green

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: auto-green-${{ github.repository }}
  cancel-in-progress: false

jobs:
  autogreen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.email "2176978853@qq.com"
          git config user.name "somewan820"

      - name: Create and push empty commit
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git commit --allow-empty -m "chore: auto green ${timestamp}"
          git push origin HEAD:"${TARGET_BRANCH}"
